name: .NET Desktop

on:
  push:
    branches: [main]
    tags: ["*.*.*", "v*.*.*"]
  pull_request:
    branches: [main]

env:
  NUGET_PACKAGES: ${{ github.workspace }}\.nuget\packages

jobs:
  license:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json', '**/*.csproj', '**/*.wixproj', '.config/dotnet-tools.json', 'eng/licenses/*.json', 'Directory.Packages.props', 'Directory.Build.props', 'NuGet.config', 'global.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dotnet tools
        run: dotnet tool restore

      - name: Restore NuGet packages
        run: dotnet restore WondayWall.sln

      - name: Generate third-party notices
        run: |
          New-Item -ItemType Directory -Force licenses
          dotnet tool run nuget-license `
            -i WondayWall.sln `
            -t `
            -a eng\licenses\allowed-licenses.json `
            -override eng\licenses\package-overrides.json `
            -ignore eng\licenses\license-download-ignored-packages.json `
            -d licenses `
            -fo licenses\THIRD-PARTY-NOTICES.md `
            -o Markdown `
            -err

      - name: Verify THIRD-PARTY-NOTICES.md is not empty
        run: |
          if (!(Test-Path "licenses\THIRD-PARTY-NOTICES.md")) {
            throw "THIRD-PARTY-NOTICES.md was not found."
          }
          if ((Get-Item "licenses\THIRD-PARTY-NOTICES.md").Length -eq 0) {
            throw "THIRD-PARTY-NOTICES.md is empty."
          }

      - uses: actions/upload-artifact@v4
        with:
          name: licenses
          path: licenses\

  build:
    needs:
      - license
    strategy:
      matrix:
        self: [true, false]
    runs-on: windows-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.gitversion.outputs.assemblySemFileVer }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json', '**/*.csproj', '**/*.wixproj', '.config/dotnet-tools.json', 'eng/licenses/*.json', 'Directory.Packages.props', 'Directory.Build.props', 'NuGet.config', 'global.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - uses: gittools/actions/gitversion/setup@v4.5.0
        with:
          versionSpec: "6.x"
      - id: gitversion
        uses: gittools/actions/gitversion/execute@v4.5.0
      - uses: actions/download-artifact@v4
        with:
          name: licenses
          path: publish\licenses
      - run: |
          dotnet publish WondayWall -c Release -o publish `
            -p:DebugType=None `
            -p:RuntimeIdentifier=win-x64 `
            -p:PublishSingleFile=true `
            -p:PublishSelfContained=${{ matrix.self }} `
            -p:Version=${{ steps.gitversion.outputs.fullSemVer }} `
            -p:AssemblyVersion=${{ steps.gitversion.outputs.assemblySemVer }} `
            -p:FileVersion=${{ steps.gitversion.outputs.assemblySemFileVer }} `
            -p:InformationalVersion=${{ steps.gitversion.outputs.informationalVersion }}
      - name: Verify THIRD-PARTY-NOTICES.md in publish output
        run: |
          if (!(Test-Path "publish\licenses\THIRD-PARTY-NOTICES.md")) {
            throw "THIRD-PARTY-NOTICES.md was not found in publish output."
          }
      - uses: actions/upload-artifact@v4
        with:
          name: WondayWall${{ matrix.self && '-full' || '' }}-${{ steps.gitversion.outputs.fullSemVer }}
          path: publish\

  installer:
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs:
      - build
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json', '**/*.csproj', '**/*.wixproj', '.config/dotnet-tools.json', 'eng/licenses/*.json', 'Directory.Packages.props', 'Directory.Build.props', 'NuGet.config', 'global.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: WondayWall-full-*
          merge-multiple: true
      - name: Verify THIRD-PARTY-NOTICES.md in artifacts
        run: |
          if (!(Test-Path "artifacts\licenses\THIRD-PARTY-NOTICES.md")) {
            throw "THIRD-PARTY-NOTICES.md was not found in artifacts."
          }
      - run: |
          dotnet run --project WondayWall.Wix.csproj -c Release
          dotnet build WondayWall.Installer.wixproj -p:OutputName=WondayWall-${{ needs.build.outputs.version }}
        working-directory: WondayWall.Wix
      - name: Generate MSIX
        shell: pwsh
        run: |
          $version = '${{ needs.build.outputs.version }}'

          # Windows SDK に同梱の makeappx.exe を検索
          $makeappx = Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\bin' -Filter 'makeappx.exe' -Recurse -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match 'x64' } |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $makeappx) {
            throw 'makeappx.exe が見つかりません。Windows SDK が必要です。'
          }

          Write-Host "makeappx.exe: $makeappx"

          # MSIX 用アイコン画像を 512px PNG から生成
          $iconSrc = 'docs\assets\icon_512.png'
          $imagesDir = 'msix-staging\Images'
          New-Item -ItemType Directory -Force -Path $imagesDir | Out-Null
          Copy-Item $iconSrc "$imagesDir\Square44x44Logo.png"
          Copy-Item $iconSrc "$imagesDir\Square150x150Logo.png"
          Copy-Item $iconSrc "$imagesDir\Wide310x150Logo.png"
          Copy-Item $iconSrc "$imagesDir\StoreLogo.png"

          # アプリバイナリをステージングへコピー
          Copy-Item 'artifacts\*' 'msix-staging\' -Recurse -Force

          # マニフェストのバージョン文字列を差し替えてステージングへ配置
          $manifest = Get-Content 'WondayWall.Package\AppxManifest.xml' -Raw -Encoding UTF8
          $manifest = $manifest.Replace('Version="0.0.0.0"', "Version=`"$version`"")
          Set-Content 'msix-staging\AppxManifest.xml' $manifest -Encoding UTF8

          # MSIX をパック（/nv = 署名検証スキップ）
          New-Item -ItemType Directory -Force -Path publish | Out-Null
          & $makeappx pack /d msix-staging /p "publish\WondayWall-$version.msix" /nv
          if ($LASTEXITCODE -ne 0) {
            throw "makeappx failed with exit code $LASTEXITCODE"
          }

          Write-Host "MSIX generated: publish\WondayWall-$version.msix"
      - uses: actions/upload-artifact@v4
        with:
          name: WondayWall-${{ needs.build.outputs.version }}.msi
          path: publish\*.msi
      - uses: actions/upload-artifact@v4
        with:
          name: WondayWall-${{ needs.build.outputs.version }}.msix
          path: publish\*.msix

  release:
    if: ${{ success() && startsWith(github.ref, 'refs/tags/') }}
    needs:
      - installer
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
      - run: |
          for dir in WondayWall-*/; do
            base=$(basename "$dir")
            if ! find "$dir" -maxdepth 1 -type f -name "*.msi" | read; then
              (cd "$dir" && zip -r "../${base}.zip" .)
            fi
          done
      - name: Verify THIRD-PARTY-NOTICES.md in zips
        run: |
          for zip in WondayWall-*.zip; do
            if ! unzip -l "$zip" | grep -q "licenses/THIRD-PARTY-NOTICES.md"; then
              echo "licenses/THIRD-PARTY-NOTICES.md not found in $zip"
              exit 1
            fi
          done
      - uses: softprops/action-gh-release@v2.6.1
        with:
          generate_release_notes: true
          draft: true
          prerelease: false
          files: |
            WondayWall-*.zip
            WondayWall-*.msi/WondayWall-*.msi
            WondayWall-*.msix/WondayWall-*.msix
