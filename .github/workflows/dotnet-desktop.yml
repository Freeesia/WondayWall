name: .NET Desktop

on:
  push:
    branches: [main]
    tags: ["*.*.*", "v*.*.*"]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        self: [true, false]
    runs-on: windows-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.gitversion.outputs.assemblySemFileVer }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.wixproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - uses: gittools/actions/gitversion/setup@v3.2.1
        with:
          versionSpec: "6.x"
      - id: gitversion
        uses: gittools/actions/gitversion/execute@v3.2.1
      - run: |
          dotnet publish WondayWall -c Release -o publish --sc ${{ matrix.self }} `
            -p:PublishSingleFile=${{ matrix.self }} `
            -p:Version=${{ steps.gitversion.outputs.fullSemVer }} `
            -p:AssemblyVersion=${{ steps.gitversion.outputs.assemblySemVer }} `
            -p:FileVersion=${{ steps.gitversion.outputs.assemblySemFileVer }} `
            -p:InformationalVersion=${{ steps.gitversion.outputs.informationalVersion }}
      - uses: actions/upload-artifact@v4
        with:
          name: WondayWall${{ matrix.self && '-full' || '' }}-${{ steps.gitversion.outputs.fullSemVer }}
          path: publish\

  installer:
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs:
      - build
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.wixproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: WondayWall-full-*
          merge-multiple: true
      - run: |
          dotnet run --project WondayWall.Wix.csproj -c Release
          dotnet build WondayWall.Installer.wixproj -p:OutputName=WondayWall-${{ needs.build.outputs.version }}
        working-directory: WondayWall.Wix
      - uses: actions/upload-artifact@v4
        with:
          name: WondayWall-${{ needs.build.outputs.version }}.msi
          path: publish\

  release:
    if: ${{ success() && startsWith(github.ref, 'refs/tags/') }}
    needs:
      - installer
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - run: |
          for dir in WondayWall-*/; do
            base=$(basename "$dir")
            if ! find "$dir" -maxdepth 1 -type f -name "*.msi" | read; then
              (cd "$dir" && zip -r "../${base}.zip" .)
            fi
          done
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: true
          prerelease: false
          files: |
            WondayWall-*.zip
            WondayWall-*.msi/WondayWall-*.msi
