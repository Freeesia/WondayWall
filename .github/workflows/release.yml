name: Release

on:
  push:
    tags: ["*.*.*", "v*.*.*"]

permissions:
  contents: read

jobs:
  desktop:
    name: Build desktop release assets
    uses: ./.github/workflows/dotnet-desktop.yml
    with:
      include-installers: true

  android:
    name: Build Android release assets
    uses: ./.github/workflows/android.yml

  release:
    name: Create draft release
    needs:
      - desktop
      - android
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare release files
        run: |
          mkdir -p release-files

          for dir in release-artifacts/WondayWall-*/; do
            [ -d "$dir" ] || continue
            base=$(basename "$dir")
            case "$base" in
              WondayWall-Android-*)
                continue
                ;;
            esac

            if find "$dir" -maxdepth 1 -type f \( -name "*.msi" -o -name "*.msix" \) | read; then
              continue
            fi

            (cd "$dir" && zip -r "$GITHUB_WORKSPACE/release-files/${base}.zip" .)
          done

          cp release-artifacts/WondayWall-*.msi/*.msi release-files/
          cp release-artifacts/WondayWall-Android-release-*/* release-files/

      - uses: softprops/action-gh-release@v3.0.0
        with:
          generate_release_notes: true
          draft: true
          prerelease: false
          files: release-files/*

  store-upload:
    name: Upload to Microsoft Store
    needs: desktop
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: WondayWall-*.msix
          path: msix-artifacts
          merge-multiple: true

      - uses: microsoft/microsoft-store-apppublisher@v1

      - name: Configure Partner Center authentication
        run: |
          msstore reconfigure `
            --tenantId "${{ secrets.AZURE_AD_TENANT_ID }}" `
            --clientId "${{ secrets.AZURE_AD_APPLICATION_CLIENT_ID }}" `
            --clientSecret "${{ secrets.AZURE_AD_APPLICATION_SECRET }}" `
            --sellerId "${{ secrets.SELLER_ID }}"

      - name: Publish MSIX to Partner Center
        run: |
          $msixPath = (Get-ChildItem -Path msix-artifacts -Filter "*.msix" | Select-Object -First 1 -ExpandProperty FullName)
          if (-not $msixPath) {
            throw "No MSIX file found in msix-artifacts. Ensure the desktop job produced a WondayWall-*.msix artifact."
          }
          msstore publish `
            -f "$msixPath" `
            -id "${{ vars.MSSTORE_PRODUCT_ID }}" `
            --noCommit

      - name: Publish submission
        if: vars.MSSTORE_SUBMIT_ON_TAG == 'true'
        run: |
          msstore submission publish `
            -id "${{ vars.MSSTORE_PRODUCT_ID }}"
