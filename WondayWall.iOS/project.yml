name: WondayWall
options:
  minimumXcodeGenVersion: 2.45.4
  xcodeVersion: "16.0"
  defaultConfig: Release
  createIntermediateGroups: true
  developmentLanguage: ja
  deploymentTarget:
    iOS: "26.0"
configs:
  Debug: debug
  Release: release
settings:
  base:
    ALWAYS_SEARCH_USER_PATHS: "NO"
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: "YES"
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: "YES"
    CLANG_ANALYZER_NONNULL: "YES"
    CLANG_ANALYZER_NUMBER_OBJECT_CONVERSION: YES_AGGRESSIVE
    CLANG_CXX_LANGUAGE_STANDARD: gnu++20
    CLANG_ENABLE_MODULES: "YES"
    CLANG_ENABLE_OBJC_ARC: "YES"
    CLANG_ENABLE_OBJC_WEAK: "YES"
    CLANG_WARN_BLOCK_CAPTURE_AUTORELEASING: "YES"
    CLANG_WARN_BOOL_CONVERSION: "YES"
    CLANG_WARN_COMMA: "YES"
    CLANG_WARN_CONSTANT_CONVERSION: "YES"
    CLANG_WARN_DEPRECATED_OBJC_IMPLEMENTATIONS: "YES"
    CLANG_WARN_DIRECT_OBJC_ISA_USAGE: YES_ERROR
    CLANG_WARN_DOCUMENTATION_COMMENTS: "YES"
    CLANG_WARN_EMPTY_BODY: "YES"
    CLANG_WARN_ENUM_CONVERSION: "YES"
    CLANG_WARN_INFINITE_LOOPS: "YES"
    CLANG_WARN_INFINITE_RECURSION: "YES"
    CLANG_WARN_INT_CONVERSION: "YES"
    CLANG_WARN_NON_LITERAL_NULL_CONVERSION: "YES"
    CLANG_WARN_OBJC_IMPLICIT_RETAIN_SELF: "YES"
    CLANG_WARN_OBJC_LITERAL_CONVERSION: "YES"
    CLANG_WARN_OBJC_ROOT_CLASS: YES_ERROR
    CLANG_WARN_QUOTED_INCLUDE_IN_FRAMEWORK_HEADER: "YES"
    CLANG_WARN_RANGE_LOOP_ANALYSIS: "YES"
    CLANG_WARN_STRICT_PROTOTYPES: "YES"
    CLANG_WARN_SUSPICIOUS_MOVE: "YES"
    CLANG_WARN_UNGUARDED_AVAILABILITY: YES_AGGRESSIVE
    CLANG_WARN_UNREACHABLE_CODE: "YES"
    CLANG_WARN__DUPLICATE_METHOD_MATCH: "YES"
    DEVELOPMENT_TEAM: KDJQJM26Y7
    ENABLE_STRICT_OBJC_MSGSEND: "YES"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    GCC_C_LANGUAGE_STANDARD: gnu17
    GCC_NO_COMMON_BLOCKS: "YES"
    GCC_WARN_64_TO_32_BIT_CONVERSION: "YES"
    GCC_WARN_ABOUT_RETURN_TYPE: YES_ERROR
    GCC_WARN_UNDECLARED_SELECTOR: "YES"
    GCC_WARN_UNINITIALIZED_AUTOS: YES_AGGRESSIVE
    GCC_WARN_UNUSED_FUNCTION: "YES"
    GCC_WARN_UNUSED_VARIABLE: "YES"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MTL_FAST_MATH: "YES"
    SDKROOT: iphoneos
    STRING_CATALOG_GENERATE_SYMBOLS: "YES"
  configs:
    Debug:
      COPY_PHASE_STRIP: "NO"
      DEBUG_INFORMATION_FORMAT: dwarf
      ENABLE_TESTABILITY: "YES"
      GCC_DYNAMIC_NO_PIC: "NO"
      GCC_OPTIMIZATION_LEVEL: "0"
      GCC_PREPROCESSOR_DEFINITIONS:
        - DEBUG=1
        - $(inherited)
      MTL_ENABLE_DEBUG_INFO: INCLUDE_SOURCE
      ONLY_ACTIVE_ARCH: "YES"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      SWIFT_OPTIMIZATION_LEVEL: -Onone
    Release:
      COPY_PHASE_STRIP: "NO"
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      ENABLE_NS_ASSERTIONS: "NO"
      SWIFT_COMPILATION_MODE: wholemodule
      SWIFT_OPTIMIZATION_LEVEL: -O
      VALIDATE_PRODUCT: "YES"
packages:
  FeedKit:
    url: https://github.com/nmdias/FeedKit.git
    from: 9.0.0
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess.git
    from: 4.2.2
  Defaults:
    url: https://github.com/sindresorhus/Defaults.git
    from: 8.0.0
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup.git
    from: 2.7.5
targets:
  WondayWall:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: WondayWall
    dependencies:
      - package: FeedKit
      - package: KeychainAccess
      - package: Defaults
      - package: SwiftSoup
      - target: WondayWallWidget
    postBuildScripts:
      - name: Copy App Icon Display Resource
        basedOnDependencyAnalysis: false
        inputFiles:
          - $(SRCROOT)/WondayWall/Resources/Assets.xcassets/AppIcon.appiconset/AppIcon.png
          - $(SRCROOT)/WondayWall/Resources/Assets.xcassets/AppIconLocal.appiconset/AppIconLocal.png
          - $(SRCROOT)/WondayWall/Resources/Assets.xcassets/AppIconPreview.appiconset/AppIconPreview.png
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/WondayWallAppIconDisplay.png
        script: |
          set -euo pipefail

          case "${ASSETCATALOG_COMPILER_APPICON_NAME:-AppIcon}" in
            AppIconLocal)
              source="${SRCROOT}/WondayWall/Resources/Assets.xcassets/AppIconLocal.appiconset/AppIconLocal.png"
              ;;
            AppIconPreview)
              source="${SRCROOT}/WondayWall/Resources/Assets.xcassets/AppIconPreview.appiconset/AppIconPreview.png"
              ;;
            *)
              source="${SRCROOT}/WondayWall/Resources/Assets.xcassets/AppIcon.appiconset/AppIcon.png"
              ;;
          esac

          destination="${SCRIPT_OUTPUT_FILE_0}"
          mkdir -p "$(dirname "$destination")"
          cp "$source" "$destination"
    settings:
      base:
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_ASSET_PATHS: ""
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: WondayWall/Info.plist
        CODE_SIGN_ENTITLEMENTS: WondayWall/WondayWall.entitlements
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/Frameworks"
        PRODUCT_NAME: $(TARGET_NAME)
        SWIFT_EMIT_LOC_STRINGS: "YES"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
      configs:
        Debug:
          ASSETCATALOG_COMPILER_APPICON_NAME: AppIconLocal
          CURRENT_PROJECT_VERSION: "0"
          MARKETING_VERSION: 0.0.0
          PRODUCT_BUNDLE_IDENTIFIER: $(WONDAYWALL_APP_BUNDLE_IDENTIFIER)
          WONDAYWALL_APP_BUNDLE_IDENTIFIER: com.studiofreesia.wondaywall.local
          WONDAYWALL_APP_GROUP_IDENTIFIER: group.com.studiofreesia.wondaywall.local
        Release:
          ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
          CURRENT_PROJECT_VERSION: "1"
          MARKETING_VERSION: "1.0"
          PRODUCT_BUNDLE_IDENTIFIER: $(WONDAYWALL_APP_BUNDLE_IDENTIFIER)
          WONDAYWALL_APP_BUNDLE_IDENTIFIER: com.studiofreesia.wondaywall
          WONDAYWALL_APP_GROUP_IDENTIFIER: group.com.studiofreesia.wondaywall
  WondayWallWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: WondayWallWidget
      - path: WondayWall/WidgetSupport
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: WondayWallWidget/WondayWallWidget.entitlements
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: WondayWallWidget/Info.plist
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/Frameworks"
          - "@executable_path/../../Frameworks"
        PRODUCT_NAME: $(TARGET_NAME)
        SKIP_INSTALL: "YES"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
      configs:
        Debug:
          CURRENT_PROJECT_VERSION: "0"
          MARKETING_VERSION: 0.0.0
          PRODUCT_BUNDLE_IDENTIFIER: $(WONDAYWALL_WIDGET_BUNDLE_IDENTIFIER)
          WONDAYWALL_WIDGET_BUNDLE_IDENTIFIER: com.studiofreesia.wondaywall.local.widget
          WONDAYWALL_APP_GROUP_IDENTIFIER: group.com.studiofreesia.wondaywall.local
        Release:
          CURRENT_PROJECT_VERSION: "1"
          MARKETING_VERSION: "1.0"
          PRODUCT_BUNDLE_IDENTIFIER: $(WONDAYWALL_WIDGET_BUNDLE_IDENTIFIER)
          WONDAYWALL_WIDGET_BUNDLE_IDENTIFIER: com.studiofreesia.wondaywall.widget
          WONDAYWALL_APP_GROUP_IDENTIFIER: group.com.studiofreesia.wondaywall
schemes:
  WondayWall:
    build:
      targets:
        WondayWall: all
        WondayWallWidget: all
    run:
      config: Debug
    archive:
      config: Release
    profile:
      config: Release
    analyze:
      config: Debug
